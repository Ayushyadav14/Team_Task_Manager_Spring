spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/task_manager
    username: ${DB_USERNAME:task_manager_admin}   # fallback for local dev
    password: ${DB_PASSWORD:admin_123123}          # fallback for local dev only

  jpa:
    hibernate:
      ddl-auto: update            # OK for local dev convenience
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"              # Expose all actuator endpoints locally
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    com.yourcompany: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-must-be-256-bits-long}
  admin:
    seed-enabled: true
    name: ${ADMIN_NAME:Admin}
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:AdminPass123!}
